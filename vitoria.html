<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Você Escapou!</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-dark text-neutral-100 min-h-screen flex flex-col justify-center bg-gradient-to-br from-neutral-900 to-black font-sans antialiased">

  <main class="container mx-auto max-w-xl px-4 py-12 text-center flex-grow flex flex-col justify-center">

    <h1 class="text-5xl md:text-7xl font-black text-yellow-500 tracking-widest mb-2 animate-bounce">
      PARABÉNS!
    </h1>
    <h2 class="text-xl md:text-2xl font-bold uppercase text-white tracking-wide mb-8">
      Você escapou da sala!
    </h2>

    <section class="bg-neutral-800 rounded-2xl p-8 shadow-2xl border border-neutral-700/50">
      <p class="text-lg text-neutral-300">Você conseguiu resolver todos os enigmas a tempo e conquistou sua liberdade.</p>
      <p class="mt-2 text-sm text-neutral-500">Obrigado por jogar!</p>

      <div class="mt-8">
        <a href="index.html" class="inline-block bg-yellow-500 hover:bg-yellow-600 text-black font-black px-10 py-4 rounded-xl uppercase tracking-wider text-sm transition-all duration-300 hover:scale-105 shadow-lg shadow-yellow-500/10">
          Jogar Novamente
        </a>
      </div>
    </section>

  </main>

  <footer class="text-center py-6 border-t border-neutral-800/80">
    <small class="text-neutral-500 text-xs tracking-wide">Desenvolvido por: <span class="text-yellow-500 font-medium">Gustavo Douglas Nunes V.</span></small>
  </footer>

</body>

</html>
