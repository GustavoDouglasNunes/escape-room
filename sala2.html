<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Escape Room - Sala 2</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light">

  <div class="container py-4">
    <h1 class="text-center mb-3">Escape Room</h1>
    <h3 class="text-center text-warning mb-4">Sala 2 - A Biblioteca</h3>

    <div class="card bg-secondary text-light mb-4">
      <div class="card-body">
        <p>Voce entrou em uma biblioteca antiga. Para sair, descubra a palavra secreta.</p>
        <p>Junte as letras escondidas nos livros para formar a palavra.</p>
      </div>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-md-2 col-4">
        <button class="btn btn-outline-light w-100" onclick="abrirLivro(1)">Livro 1</button>
      </div>
      <div class="col-md-2 col-4">
        <button class="btn btn-outline-light w-100" onclick="abrirLivro(2)">Livro 2</button>
      </div>
      <div class="col-md-2 col-4">
        <button class="btn btn-outline-light w-100" onclick="abrirLivro(3)">Livro 3</button>
      </div>
      <div class="col-md-2 col-4">
        <button class="btn btn-outline-light w-100" onclick="abrirLivro(4)">Livro 4</button>
      </div>
      <div class="col-md-2 col-4">
        <button class="btn btn-outline-light w-100" onclick="abrirLivro(5)">Livro 5</button>
      </div>
    </div>

    <div id="letras" class="alert alert-info" style="display:none;"></div>

    <div class="card bg-secondary text-light">
      <div class="card-body">
        <h5>Digite a palavra secreta</h5>
        <div class="row g-2 align-items-center">
          <div class="col-auto">
            <input type="text" id="palavra" class="form-control text-center" placeholder="palavra">
          </div>
          <div class="col-auto">
            <button class="btn btn-warning" onclick="verificarPalavra()">Confirmar</button>
          </div>
        </div>
        <div id="resultado" class="mt-3"></div>
      </div>
    </div>

    <footer class="text-center mt-5 py-3 border-top border-secondary">
      <small class="text-muted">Desenvolvido por: <span class="text-warning">Gustavo Douglas Nunes V.</span></small>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
