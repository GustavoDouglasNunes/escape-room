<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Escape Room - Sala 3</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light">

  <div class="container py-4">
    <h1 class="text-center mb-3">Escape Room</h1>
    <h3 class="text-center text-warning mb-4">Sala 3 - A Saida Final</h3>

    <div class="card bg-secondary text-light mb-4">
      <div class="card-body">
        <p>Ultima sala! Tres alavancas controlam a porta de saida.</p>
        <p>Decifre o enigma abaixo e ative as alavancas na ordem correta.</p>
        <div class="alert alert-dark mt-3">
          <strong>Enigma:</strong><br>
          "Comece pelo sol, siga para a lua, e termine na estrela."
        </div>
      </div>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-md-4 col-12">
        <button class="btn btn-outline-warning w-100 btn-lg alavanca" onclick="puxarAlavanca('sol')">Alavanca SOL</button>
      </div>
      <div class="col-md-4 col-12">
        <button class="btn btn-outline-warning w-100 btn-lg alavanca" onclick="puxarAlavanca('lua')">Alavanca LUA</button>
      </div>
      <div class="col-md-4 col-12">
        <button class="btn btn-outline-warning w-100 btn-lg alavanca" onclick="puxarAlavanca('estrela')">Alavanca ESTRELA</button>
      </div>
    </div>

    <div class="card bg-secondary text-light">
      <div class="card-body">
        <h5>Sequencia ativada:</h5>
        <p id="sequencia" class="fs-4 text-warning">(nenhuma)</p>
        <button class="btn btn-danger" onclick="resetarSequencia()">Resetar</button>
        <div id="resultado" class="mt-3"></div>
      </div>
    </div>

    <footer class="text-center mt-5 py-3 border-top border-secondary">
      <small class="text-muted">Desenvolvido por: <span class="text-warning">Gustavo Douglas Nunes V.</span></small>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
