<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escape Room - Sala 3</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-dark text-neutral-100 min-h-screen flex flex-col justify-center bg-gradient-to-br from-neutral-900 to-black font-sans antialiased">

  <header class="text-center mt-8 mb-4">
    <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight uppercase text-white">ESCAPE ROOM</h1>
    <h3 class="text-yellow-500 text-xl font-medium mt-2 tracking-wide">Sala 3 - A Saída Final</h3>
  </header>

  <main class="container mx-auto max-w-3xl px-4 py-6 flex-grow">

    <section class="bg-neutral-800 rounded-xl p-6 mb-6 shadow-2xl border border-neutral-700/50">
      <p class="text-lg text-neutral-300">Última sala! Três alavancas controlam a porta de saída.</p>
      <p class="mt-1 text-sm text-neutral-400">Decifre o enigma abaixo e ative as alavancas na ordem correta.</p>
      <div class="bg-neutral-900/60 border border-neutral-700 rounded-lg p-4 mt-4 text-center">
        <span class="text-xs text-yellow-500 font-bold uppercase tracking-wider block mb-1">Enigma</span>
        <p class="text-xl font-medium italic text-neutral-200">"Comece pelo sol, siga para a lua, e termine na estrela."</p>
      </div>
    </section>

    <section class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
      <button id="btn-sol" class="alavanca bg-transparent border-2 border-yellow-500/60 text-yellow-500 rounded-xl p-5 font-extrabold uppercase tracking-widest text-base transition-all duration-300 hover:-translate-y-1 hover:scale-105 hover:bg-yellow-500 hover:text-black focus:outline-none focus:ring-2 focus:ring-yellow-500" onclick="puxarAlavanca('sol')">
        Alavanca SOL
      </button>
      <button id="btn-lua" class="alavanca bg-transparent border-2 border-yellow-500/60 text-yellow-500 rounded-xl p-5 font-extrabold uppercase tracking-widest text-base transition-all duration-300 hover:-translate-y-1 hover:scale-105 hover:bg-yellow-500 hover:text-black focus:outline-none focus:ring-2 focus:ring-yellow-500" onclick="puxarAlavanca('lua')">
        Alavanca LUA
      </button>
      <button id="btn-estrela" class="alavanca bg-transparent border-2 border-yellow-500/60 text-yellow-500 rounded-xl p-5 font-extrabold uppercase tracking-widest text-base transition-all duration-300 hover:-translate-y-1 hover:scale-105 hover:bg-yellow-500 hover:text-black focus:outline-none focus:ring-2 focus:ring-yellow-500" onclick="puxarAlavanca('estrela')">
        Alavanca ESTRELA
      </button>
    </section>

    <section class="bg-neutral-800 rounded-xl p-6 shadow-2xl border border-neutral-700/50">
      <h2 class="text-xs md:text-sm text-yellow-500 font-bold uppercase tracking-widest mb-2">Sequência Ativada:</h2>

      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <p id="sequencia" class="text-2xl font-black text-yellow-500 tracking-wider uppercase bg-neutral-900/40 px-4 py-2 rounded-lg border border-neutral-700/30 w-full sm:w-auto text-center sm:text-left">
          (nenhuma)
        </p>
        <button class="bg-red-600 hover:bg-red-700 text-white font-bold px-6 py-2 rounded-lg text-sm uppercase tracking-wider transition-colors w-full sm:w-auto" onclick="resetarSequencia()">
          Resetar
        </button>
      </div>

      <div id="resultado" role="status" class="mt-4 text-lg font-bold min-h-[1.5rem]"></div>
    </section>

  </main>

  <footer class="text-center py-6 border-t border-neutral-800/80 mt-8">
    <small class="text-neutral-500 text-xs tracking-wide">Desenvolvido por: <span class="text-yellow-500 font-medium">Gustavo Douglas Nunes V.</span></small>
  </footer>

  <script src="script.js"></script>
</body>

</html>
