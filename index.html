<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Escape Room - Sala 1</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light">

  <div class="container py-4">
    <h1 class="text-center mb-3">Escape Room</h1>
    <h3 class="text-center text-warning mb-4">Sala 1 - O Quarto Trancado</h3>

    <div class="card bg-secondary text-light mb-4">
      <div class="card-body">
        <p>Voce acorda em um quarto escuro. A porta esta trancada com um cadeado de 3 digitos.</p>
        <p>Olhe ao redor, clique nos objetos para investigar e encontre o codigo.</p>
      </div>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-md-3 col-6">
        <button class="btn btn-outline-light w-100 objeto" onclick="investigar('quadro')">Quadro na parede</button>
      </div>
      <div class="col-md-3 col-6">
        <button class="btn btn-outline-light w-100 objeto" onclick="investigar('cama')">Cama</button>
      </div>
      <div class="col-md-3 col-6">
        <button class="btn btn-outline-light w-100 objeto" onclick="investigar('tapete')">Tapete</button>
      </div>
      <div class="col-md-3 col-6">
        <button class="btn btn-outline-light w-100 objeto" onclick="investigar('livro')">Livro na estante</button>
      </div>
    </div>

    <div id="pista" class="alert alert-info" style="display:none;"></div>

    <div class="card bg-secondary text-light">
      <div class="card-body">
        <h5>Cadeado da porta</h5>
        <div class="row g-2 align-items-center">
          <div class="col-auto">
            <input type="text" id="codigo" maxlength="3" class="form-control text-center" placeholder="000">
          </div>
          <div class="col-auto">
            <button class="btn btn-warning" onclick="verificarCodigo()">Abrir porta</button>
          </div>
        </div>
        <div id="resultado" class="mt-3"></div>
      </div>
    </div>

    <footer class="text-center mt-5 py-3 border-top border-secondary">
      <small class="text-muted">Desenvolvido por: <span class="text-warning">Gustavo Douglas Nunes V.</span></small>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
